<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sachin Egg Traders | Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    
    :root {
      --yolk: #E8920A;
      --green: #2A7A48;
      --ink: #18120A;
      --muted: #7A6040;
      --cream: #FDFAF4;
      --shell: #EDE2CC;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--cream);
      color: var(--ink);
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
      padding-top: 20px;
    }

    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: var(--ink);
    }

    .header p {
      color: var(--muted);
      font-size: 1rem;
    }

    .login-section {
      background: #fff;
      border: 2px solid var(--shell);
      border-radius: 20px;
      padding: 40px;
      margin-bottom: 30px;
      text-align: center;
      display: none;
    }

    .login-section.show {
      display: block;
    }

    .login-section h2 {
      font-size: 1.5rem;
      margin-bottom: 20px;
    }

    .login-input {
      width: 100%;
      max-width: 300px;
      padding: 12px 16px;
      border: 2px solid var(--shell);
      border-radius: 10px;
      font-size: 1rem;
      margin-bottom: 16px;
      font-family: 'Outfit', sans-serif;
    }

    .login-input:focus {
      outline: none;
      border-color: var(--yolk);
      box-shadow: 0 0 0 3px rgba(232, 146, 10, 0.1);
    }

    .login-btn {
      background: var(--green);
      color: #fff;
      padding: 12px 32px;
      border: none;
      border-radius: 100px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }

    .login-btn:hover {
      background: #1f5c36;
    }

    .main-panel {
      display: none;
    }

    .main-panel.show {
      display: block;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--shell);
    }

    .panel-header h2 {
      font-size: 1.5rem;
    }

    .logout-btn {
      background: #FF6B6B;
      color: #fff;
      padding: 8px 16px;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .logout-btn:hover {
      background: #E63946;
    }

    .form-section {
      background: #fff;
      border: 2px solid var(--shell);
      border-radius: 20px;
      padding: 40px;
      margin-bottom: 30px;
    }

    .form-section h3 {
      font-size: 1.3rem;
      margin-bottom: 30px;
      color: var(--green);
    }

    .price-form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      margin-bottom: 30px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--ink);
    }

    .form-group input,
    .form-group select {
      padding: 12px 16px;
      border: 2px solid var(--shell);
      border-radius: 10px;
      font-size: 1rem;
      font-family: 'Outfit', sans-serif;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--yolk);
      box-shadow: 0 0 0 3px rgba(232, 146, 10, 0.1);
    }

    .form-group input[type="number"] {
      font-size: 1.2rem;
    }

    .update-date-group {
      grid-column: 1 / -1;
    }

    .button-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 30px;
    }

    .save-btn {
      background: var(--green);
      color: #fff;
      padding: 14px 32px;
      border: none;
      border-radius: 100px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s, transform 0.1s;
    }

    .save-btn:hover {
      background: #1f5c36;
      transform: translateY(-2px);
    }

    .save-btn:active {
      transform: translateY(0);
    }

    .reset-btn {
      background: var(--muted);
      color: #fff;
      padding: 14px 32px;
      border: none;
      border-radius: 100px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }

    .reset-btn:hover {
      background: #654321;
    }

    .preview-section {
      background: linear-gradient(135deg, #2A7A48 0%, #1f5c36 100%);
      border-radius: 20px;
      padding: 30px;
      color: #fff;
    }

    .preview-section h3 {
      font-size: 1.2rem;
      margin-bottom: 20px;
      color: #FBB830;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
    }

    .preview-item {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .preview-type {
      font-size: 0.9rem;
      opacity: 0.9;
      margin-bottom: 8px;
    }

    .preview-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: #FBB830;
      margin-bottom: 6px;
    }

    .preview-trend {
      font-size: 0.85rem;
      font-weight: 500;
    }

    .message {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      text-align: center;
      font-weight: 600;
      display: none;
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: #4ECDC4;
      color: #fff;
    }

    .message.error {
      background: #FF6B6B;
      color: #fff;
    }

    .error-text {
      color: #FF6B6B;
      font-size: 0.85rem;
      margin-top: 4px;
    }

    @media (max-width: 640px) {
      .header h1 {
        font-size: 1.8rem;
      }

      .form-section {
        padding: 20px;
      }

      .price-form {
        grid-template-columns: 1fr;
      }

      .button-group {
        flex-direction: column;
      }

      .save-btn,
      .reset-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🥚 Admin Panel</h1>
      <p>Sachin Egg Traders - Update Daily Prices</p>
    </div>

    <!-- LOGIN SECTION -->
    <div class="login-section show" id="loginSection">
      <h2>Enter Password</h2>
      <input type="password" id="passwordInput" class="login-input" placeholder="Enter admin password" />
      <div class="error-text" id="passwordError"></div>
      <button class="login-btn" onclick="checkPassword()">Login</button>
    </div>

    <!-- MAIN PANEL -->
    <div class="main-panel" id="mainPanel">
      <div class="panel-header">
        <h2>Price Manager</h2>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>

      <div id="successMessage" class="message success"></div>
      <div id="errorMessage" class="message error"></div>

      <!-- PRICE UPDATE FORM -->
      <div class="form-section">
        <h3>Update Prices (1 Peti = 210 Pieces)</h3>
        <div class="price-form">
          <!-- BIG EGG -->
          <div>
            <div class="form-group">
              <label for="bigPrice">Big Egg Price (₹ per peti)</label>
              <input type="number" id="bigPrice" min="0" step="1" placeholder="e.g., 1100" />
            </div>
            <!-- trend removed -->
          </div>

          <!-- MEDIUM EGG -->
          <div>
            <div class="form-group">
              <label for="mediumPrice">Medium Egg Price (₹ per peti)</label>
              <input type="number" id="mediumPrice" min="0" step="1" placeholder="e.g., 1000" />
            </div>
            <!-- trend removed -->
          </div>

          <!-- SMALL EGG -->
          <div>
            <div class="form-group">
              <label for="smallPrice">Small Egg Price (₹ per peti)</label>
              <input type="number" id="smallPrice" min="0" step="1" placeholder="e.g., 900" />
            </div>
            <!-- trend removed -->
          </div>

          <!-- DESI EGG -->
          <div>
            <div class="form-group">
              <label for="desiPrice">Desi Egg Price (₹ per peti)</label>
              <input type="number" id="desiPrice" min="0" step="1" placeholder="e.g., 1200" />
            </div>
            <!-- trend removed -->
          </div>

          <!-- DUCK EGG -->
          <div>
            <div class="form-group">
              <label for="duckPrice">Duck Egg Price (₹ per peti)</label>
              <input type="number" id="duckPrice" min="0" step="1" placeholder="e.g., 1500" />
            </div>
            <!-- trend removed -->
          </div>
          <!-- UPDATE DATE -->
          <div class="update-date-group">
            <div class="form-group">
              <label for="updateDate">Last Updated Date</label>
              <input type="text" id="updateDate" placeholder="e.g., May 10, 2026" />
            </div>
          </div>
        </div>

        <div class="button-group">
          <button class="save-btn" onclick="savePrices()">💾 Save Prices</button>
          <button class="reset-btn" onclick="loadPrices()">🔄 Reset Form</button>
        </div>
      </div>

      <!-- PREVIEW SECTION -->
      <div class="preview-section">
        <h3>📊 Preview (How it will look on website)</h3>
        <div class="preview-grid">
          <div class="preview-item">
            <div class="preview-type" id="previewBigType">Big Egg</div>
            <div class="preview-price" id="previewBigPrice">₹ 1100</div>
          </div>
          <div class="preview-item">
            <div class="preview-type" id="previewMediumType">Medium Egg</div>
            <div class="preview-price" id="previewMediumPrice">₹ 1000</div>
          </div>
          <div class="preview-item">
            <div class="preview-type" id="previewSmallType">Small Egg</div>
            <div class="preview-price" id="previewSmallPrice">₹ 900</div>
          </div>
          <div class="preview-item">
            <div class="preview-type" id="previewDesiType">Desi Egg</div>
            <div class="preview-price" id="previewDesiPrice">₹ 1200</div>
          </div>
          <div class="preview-item">
            <div class="preview-type" id="previewDuckType">Duck Egg</div>
            <div class="preview-price" id="previewDuckPrice">₹ 1500</div>
          </div>
        </div>
        <div style="text-align: center; margin-top: 20px; font-size: 0.9rem; opacity: 0.9;">
          Last updated: <span id="previewDate">May 10, 2026</span> • 1 Peti = 210 Pieces
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://server-seven-orpin-87.vercel.app/api/prices';

    // PASSWORD SETTINGS - Change this to your desired password
    const ADMIN_PASSWORD = "sachin123";

    // INITIALIZE
    document.addEventListener('DOMContentLoaded', () => {
      if (sessionStorage.getItem('adminLoggedIn') === 'true') {
        showMainPanel();
      }
      loadPrices();
    });

    // PASSWORD CHECK
    function checkPassword() {
      const password = document.getElementById('passwordInput').value;
      const errorDiv = document.getElementById('passwordError');
      
      if (password === ADMIN_PASSWORD) {
        sessionStorage.setItem('adminLoggedIn', 'true');
        document.getElementById('passwordInput').value = '';
        errorDiv.textContent = '';
        showMainPanel();
      } else {
        errorDiv.textContent = '❌ Incorrect password. Try again.';
        document.getElementById('passwordInput').focus();
      }
    }

    // ALLOW ENTER KEY
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && document.getElementById('loginSection').classList.contains('show')) {
        checkPassword();
      }
    });

    // SHOW MAIN PANEL
    function showMainPanel() {
      document.getElementById('loginSection').classList.remove('show');
      document.getElementById('mainPanel').classList.add('show');
    }

    // LOGOUT
    function logout() {
      sessionStorage.removeItem('adminLoggedIn');
      document.getElementById('loginSection').classList.add('show');
      document.getElementById('mainPanel').classList.remove('show');
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
    }

    // LOAD PRICES FROM STORAGE
    function loadPrices() {
      const prices = getPricesFromStorage();
      
      document.getElementById('bigPrice').value = prices.big.price;
      document.getElementById('mediumPrice').value = prices.medium.price;
      document.getElementById('smallPrice').value = prices.small.price;
      document.getElementById('desiPrice').value = prices.desi.price;
      document.getElementById('duckPrice').value = prices.duck.price;
      document.getElementById('updateDate').value = prices.updateDate;
      
      updatePreview();
    }

    // GET PRICES FROM STORAGE
    function getPricesFromStorage() {
      const stored = localStorage.getItem('eggPrices');
      if (stored) {
        return JSON.parse(stored);
      }
      
      // DEFAULT PRICES (1 Peti = 210 Pieces)
      return {
        big: { price: '1100' },
        medium: { price: '1000' },
        small: { price: '900' },
        desi: { price: '1200' },
        duck: { price: '1500' },
        updateDate: 'May 10, 2026'
      };
    }

    // SAVE PRICES TO STORAGE and try to persist to API
    async function savePrices() {
      const prices = {
        big: { price: document.getElementById('bigPrice').value || '0' },
        medium: { price: document.getElementById('mediumPrice').value || '0' },
        small: { price: document.getElementById('smallPrice').value || '0' },
        desi: { price: document.getElementById('desiPrice').value || '0' },
        duck: { price: document.getElementById('duckPrice').value || '0' },
        updateDate: document.getElementById('updateDate').value || 'Today'
      };

      // VALIDATION
      if (!prices.big.price || !prices.medium.price || !prices.small.price || !prices.desi.price || !prices.duck.price) {
        showError('❌ Please fill in all prices');
        return;
      }

      // Save locally first (fallback)
      localStorage.setItem('eggPrices', JSON.stringify(prices));

      // Prepare API payloads (convert per-peti to per-egg and per-tray)
      const mapTypes = [
        { key: 'big', eggType: 'big' },
        { key: 'medium', eggType: 'medium' },
        { key: 'small', eggType: 'small' },
        { key: 'desi', eggType: 'desi' },
        { key: 'duck', eggType: 'duck' }
      ];

      const adminPassword = ADMIN_PASSWORD; // kept client-side for convenience

      try {
        const results = await Promise.all(mapTypes.map(async (m) => {
          const peti = Number(prices[m.key].price);
          const pricePerEgg = Number((peti / 210).toFixed(2));
          const pricePerTray = Number((pricePerEgg * 30).toFixed(2));

          const resp = await fetch(`${API_URL}/${encodeURIComponent(m.eggType)}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: adminPassword, pricePerEgg, pricePerTray })
          });

          if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            return { ok: false, eggType: m.eggType, status: resp.status, error: err.error || 'Unknown' };
          }
          const data = await resp.json().catch(() => ({}));
          return { ok: true, eggType: m.eggType, data };
        }));

        const failed = results.filter(r => !r.ok);
        if (failed.length === 0) {
          showSuccess('✅ Prices saved to server and local storage. Website will reflect changes shortly.');
        } else {
          console.warn('Some updates failed', failed);
          showError('⚠️ Some updates failed to save to server. Data saved locally.');
        }
      } catch (e) {
        console.error('API error', e);
        showError('⚠️ Unable to reach server. Prices saved locally.');
      }

      updatePreview();
    }

    // UPDATE PREVIEW
    function updatePreview() {
      const prices = getPricesFromStorage();
      
      document.getElementById('previewBigPrice').textContent = '₹ ' + prices.big.price;
      document.getElementById('previewMediumPrice').textContent = '₹ ' + prices.medium.price;
      document.getElementById('previewSmallPrice').textContent = '₹ ' + prices.small.price;
      document.getElementById('previewDesiPrice').textContent = '₹ ' + prices.desi.price;
      document.getElementById('previewDuckPrice').textContent = '₹ ' + prices.duck.price;
      document.getElementById('previewDate').textContent = prices.updateDate;
    }

    // SHOW SUCCESS MESSAGE
    function showSuccess(msg) {
      const msgDiv = document.getElementById('successMessage');
      msgDiv.textContent = msg;
      msgDiv.classList.add('show');
      setTimeout(() => {
        msgDiv.classList.remove('show');
      }, 4000);
    }

    // SHOW ERROR MESSAGE
    function showError(msg) {
      const msgDiv = document.getElementById('errorMessage');
      msgDiv.textContent = msg;
      msgDiv.classList.add('show');
      setTimeout(() => {
        msgDiv.classList.remove('show');
      }, 4000);
    }

    // LIVE PREVIEW UPDATE
    document.getElementById('bigPrice')?.addEventListener('input', updatePreview);
    document.getElementById('mediumPrice')?.addEventListener('input', updatePreview);
    document.getElementById('smallPrice')?.addEventListener('input', updatePreview);
    document.getElementById('desiPrice')?.addEventListener('input', updatePreview);
    document.getElementById('duckPrice')?.addEventListener('input', updatePreview);
    document.getElementById('updateDate')?.addEventListener('input', updatePreview);
  </script>
</body>
</html>
