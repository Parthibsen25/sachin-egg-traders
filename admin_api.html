<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin – Sachin Egg Traders</title>
  <style>
    body { font-family: sans-serif; background: #fff8ee; padding: 20px; max-width: 520px; margin: 0 auto; }
    h1 { color: #E8920A; margin-bottom: 6px; }
    .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 28px; }
    .card { background: #fff; border: 1.5px solid #EDE2CC; border-radius: 16px; padding: 24px; margin-bottom: 20px; }
    .card h2 { font-size: 1.1rem; margin-bottom: 16px; }
    label { font-size: 0.82rem; color: #666; font-weight: 600; display: block; margin-bottom: 4px; }
    input { width: 100%; padding: 10px 14px; border: 1.5px solid #EDE2CC; border-radius: 10px; font-size: 0.95rem; margin-bottom: 14px; outline: none; }
    input:focus { border-color: #E8920A; }
    button { width: 100%; background: #E8920A; color: #fff; border: none; padding: 13px; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; }
    button:hover { background: #c47808; }
    .msg { text-align: center; margin-top: 12px; font-size: 0.9rem; font-weight: 600; }
    .msg.success { color: #2A7A48; }
    .msg.error   { color: #C0392B; }
    .password-box { background: #fff; border: 1.5px solid #EDE2CC; border-radius: 16px; padding: 24px; margin-bottom: 28px; }
  </style>
</head>
<body>

<h1>🥚 Admin Panel</h1>
<p class="subtitle">Sachin Egg Traders – Purulia, West Bengal</p>

<div class="password-box">
  <label>Admin Password</label>
  <input type="password" id="adminPassword" placeholder="Enter your password"/>
</div>

<div class="card"><h2>🥚 Big Egg Price</h2><label>Price per Egg (₹)</label><input type="number" id="big-egg" placeholder="e.g. 5.24" step="0.01"/><label>Price per Tray of 30 (₹)</label><input type="number" id="big-tray" placeholder="e.g. 157"/><button onclick="updatePrice('big', 'Big')">Update Big Egg Price</button><div class="msg" id="msg-big"></div></div>
<div class="card"><h2>🥚 Medium Egg Price</h2><label>Price per Egg (₹)</label><input type="number" id="medium-egg" placeholder="e.g. 4.76" step="0.01"/><label>Price per Tray of 30 (₹)</label><input type="number" id="medium-tray" placeholder="e.g. 143"/><button onclick="updatePrice('medium', 'Medium')">Update Medium Egg Price</button><div class="msg" id="msg-medium"></div></div>
<div class="card"><h2>🥚 Small Egg Price</h2><label>Price per Egg (₹)</label><input type="number" id="small-egg" placeholder="e.g. 4.29" step="0.01"/><label>Price per Tray of 30 (₹)</label><input type="number" id="small-tray" placeholder="e.g. 129"/><button onclick="updatePrice('small', 'Small')">Update Small Egg Price</button><div class="msg" id="msg-small"></div></div>
<div class="card"><h2>🍳 Desi Egg Price</h2><label>Price per Egg (₹)</label><input type="number" id="desi-egg" placeholder="e.g. 5.71" step="0.01"/><label>Price per Tray of 30 (₹)</label><input type="number" id="desi-tray" placeholder="e.g. 171"/><button onclick="updatePrice('desi', 'Desi')">Update Desi Egg Price</button><div class="msg" id="msg-desi"></div></div>
<div class="card"><h2>🟤 Duck Egg Price</h2><label>Price per Egg (₹)</label><input type="number" id="duck-egg" placeholder="e.g. 7.14" step="0.01"/><label>Price per Tray of 30 (₹)</label><input type="number" id="duck-tray" placeholder="e.g. 214"/><button onclick="updatePrice('duck', 'Duck')">Update Duck Egg Price</button><div class="msg" id="msg-duck"></div></div>

<script>
  const API_URL = 'https://server-seven-orpin-87.vercel.app/api/prices';

  async function loadCurrentPrices() {
    try {
      const res = await fetch(API_URL, { cache: 'no-store' });
      const prices = await res.json();
      if (!Array.isArray(prices)) return;
      prices.forEach(p => {
        const key = (p.eggType || '').toLowerCase();
        const eggEl = document.getElementById(key + '-egg');
        const trayEl = document.getElementById(key + '-tray');
        if (eggEl) eggEl.value = p.pricePerEgg;
        if (trayEl) trayEl.value = p.pricePerTray;
      });
    } catch (err) {
      console.log('Could not load prices');
    }
  }

  async function updatePrice(key, label) {
    const password = document.getElementById('adminPassword').value;
    const pricePerEgg = parseFloat(document.getElementById(key + '-egg').value);
    const pricePerTray = parseFloat(document.getElementById(key + '-tray').value);
    const msgEl = document.getElementById('msg-' + key);

    if (!password) { msgEl.textContent = '❌ Enter password first!'; msgEl.className = 'msg error'; return; }
    if (Number.isNaN(pricePerEgg) || Number.isNaN(pricePerTray)) { msgEl.textContent = '❌ Enter both prices!'; msgEl.className = 'msg error'; return; }

    try {
      const res = await fetch(`${API_URL}/${encodeURIComponent(key)}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password, pricePerEgg, pricePerTray })
      });
      const data = await res.json();
      if (res.ok) {
        msgEl.textContent = `✅ ${label} price updated successfully!`;
        msgEl.className = 'msg success';
      } else {
        msgEl.textContent = '❌ ' + (data.error || 'Update failed');
        msgEl.className = 'msg error';
      }
    } catch (err) {
      msgEl.textContent = '❌ Could not connect to server';
      msgEl.className = 'msg error';
    }
  }

  loadCurrentPrices();
</script>

</body>
</html>
