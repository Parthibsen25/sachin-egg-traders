<svg xmlns="http://www.w3.org/2000/svg" width="360" height="64" viewBox="0 0 360 64" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Sachin Egg Traders</title>
  <desc id="logoDesc">Horizontal logo: simplified hen icon and wordmark for Sachin Egg Traders</desc>
  <rect width="100%" height="100%" fill="none"/>
  <!-- simplified hen mark -->
  <g transform="translate(8,2) scale(0.9)">
    <ellipse cx="24" cy="34" rx="14" ry="18" fill="#FFFCF0" stroke="#E0B07A" stroke-width="1"/>
    <circle cx="12" cy="22" r="4" fill="#18120A"/>
    <path d="M36 18c6 2 10 8 12 14c2 6 0 10-2 12" stroke="#18120A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>
  <!-- text -->
  <text x="72" y="26" font-family="Cormorant Garamond, serif" font-size="20" fill="#18120A" font-weight="700">Sachin</text>
  <text x="72" y="46" font-family="Outfit, sans-serif" font-size="14" fill="#18120A">Egg Traders · Purulia, West Bengal</text>
